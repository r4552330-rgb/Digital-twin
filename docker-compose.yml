version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pv_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: pv_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: pv_password
      DOCKER_INFLUXDB_INIT_ORG: pv_org
      DOCKER_INFLUXDB_INIT_BUCKET: pv_data
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pv_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  influxdb_data:
